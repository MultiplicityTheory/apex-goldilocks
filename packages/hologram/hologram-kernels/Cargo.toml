[package]
name = "hologram-kernels"
version = "0.1.0"
edition = "2021"
authors = ["UOR Foundation"]
description = "Native Rust implementations of legacy ONNX and stdlib kernels"
license = "MIT OR Apache-2.0"

[dependencies]
num-traits = "0.2"
# Optional: use hologram-core if needed, but these are intended to be "native" implementations
# hologram-core = { path = "../hologram-core" }

[lib]
path = "src/lib.rs"
