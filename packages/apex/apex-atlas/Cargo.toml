[package]
name = "apex-atlas"
version = "0.1.0"
edition = "2021"
authors = ["UOR Foundation"]
description = "Low-level coordinate algebra and group actions for the Atlas manifold"
license = "MIT OR Apache-2.0"

[dependencies]
num-rational = { version = "0.4", features = ["serde"] }
num-traits = "0.2"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "1.0"

[dev-dependencies]
proptest = "1.4"
