[package]
name = "adr-tool"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "adr-tool"
path = "src/main.rs"

[dependencies]
clap = { version = "4.0", features = ["derive"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1.0", features = ["rt-multi-thread", "macros"] }
anyhow = "1.0"
thiserror = "1.0"
tracing = "0.1"
chrono = "0.4"
# Keep minimal initially, can add others later as needed.
