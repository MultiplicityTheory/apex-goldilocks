[package]
name = "multiplicity-core"
version = "0.1.0"
edition = "2021"

[dependencies]
# Basic utilities
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "1.0"
log = "0.4"
chrono = "0.4"

# Cryptography & Security
sha2 = "0.10"
blake2b_simd = "1.0"

# Math/Cryptography
goldilocks = { path = "../goldilocks" }
# Assuming a standard sparse matrix implementation
# sparse-matrices = "0.1" 

[dev-dependencies]
tempfile = "3.10"
proptest = "1.4"
