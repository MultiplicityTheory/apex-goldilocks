[package]
name = "aep-sovereignty-gate"
version = "0.1.0"
edition = "2021"
description = "Sovereignty Gate AEP implementation in Rust"

[dependencies]
anyhow = "1.0"
thiserror = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
toml = "0.8"
glob = "0.3"
chrono = "0.4"
# multiplicity-core = { path = "../../packages/multiplicity-core" }

[lib]
name = "aep_sovereignty_gate"
path = "src/lib.rs"

[[bin]]
name = "aep-sovereignty-gate-runner"
path = "src/main.rs"
