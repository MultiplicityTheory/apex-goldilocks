[package]
name = "aep-ethics-commutation"
version = "0.1.0"
edition = "2021"
description = "Ethics Commutation AEP implementation in Rust"

[dependencies]
anyhow = "1.0"
thiserror = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
toml = "0.8"
ndarray = { version = "0.15", features = ["serde"] }
ndarray-npy = { version = "0.8", default-features = false }
glob = "0.3"
chrono = "0.4"
# multiplicity-core = { path = "../../packages/multiplicity-core" }

[lib]
name = "aep_ethics_commutation"
path = "src/lib.rs"

[[bin]]
name = "aep-ethics-commutation-runner"
path = "src/main.rs"
